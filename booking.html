<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Trial Booking | BeingFit - Top Gyms</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS VARIABLES (Must match other pages) --- */
        :root {
            --primary-red: #E63946;
            --dark-black: #111111;
            --light-grey: #f4f4f4;
            --white: #ffffff;
            --text-grey: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--dark-black);
            color: var(--white);
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-weight: 800;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }

        /* --- HEADER --- */
        header {
            background-color: rgba(17, 17, 17, 0.95);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-red);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 1px;
        }

        .logo span { color: var(--primary-red); }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-links a:hover { color: var(--primary-red); }

        .btn {
            padding: 10px 25px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .btn-red {
            background-color: var(--primary-red);
            color: var(--white);
        }

        .btn-red:hover { background-color: #c92a36; }

        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }

        /* --- HERO SECTION --- */
        .page-hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 80px;
        }

        .page-hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .page-hero p {
            font-size: 1.2rem;
            color: var(--primary-red);
            font-weight: 700;
        }

        /* --- BOOKING FORM SECTION --- */
        .booking-section {
            padding: 80px 0;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-attachment: fixed;
        }

        .booking-form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: var(--white);
            border-radius: 4px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-red);
            color: var(--white);
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }

        .submit-btn:hover {
            background: #c92a36;
        }

        /* --- FOOTER --- */
        footer {
            background-color: #000;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid #333;
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            display: inline-block;
        }

        .footer-logo span { color: var(--primary-red); }

        .copyright {
            color: var(--text-grey);
            font-size: 0.9rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
            .page-hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">BEING<span>FIT</span></div>
                <div class="hamburger"><i class="fas fa-bars"></i></div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="membership.html">Membership</a></li>
                    <li><a href="booking.html" style="color: var(--primary-red);">Free Trial</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <a href="booking.html" class="btn btn-red">Book Free Trial</a>
            </nav>
        </div>
    </header>

    <!-- Page Hero -->
    <section class="page-hero">
        <div class="container">
            <h1>Book Free Trial</h1>
            <p>Experience BeingFit Today | No Commitment Required</p>
        </div>
    </section>

    <!-- Booking Form Section -->
    <section class="booking-section">
        <div class="container">
            <div class="booking-form">
                <h2 style="text-align: center; margin-bottom: 30px;">Free Trial Registration</h2>
                <form id="trialForm" onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Preferred Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="time">Preferred Time</label>
                        <select id="time" name="time" required>
                            <option value="">Select a time slot</option>
                            <option value="09:00">09:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="12:00">12:00 PM</option>
                            <option value="13:00">01:00 PM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="15:00">03:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                            <option value="17:00">05:00 PM</option>
                            <option value="18:00">06:00 PM</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Book Free Trial</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-logo">BEING<span>FIT</span></div>
            <p class="copyright">&copy; 2023 BeingFit. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        function submitForm(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            
            alert(`Thank you ${name}! Your free trial for ${date} at ${time} has been booked. We will contact you soon.`);
            document.getElementById('trialForm').reset();
        }
    </script>

</body>
</html>
